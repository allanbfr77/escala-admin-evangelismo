<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escala Admin — Grupo de Evangelismo — Maio 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:       #0d1117;
  --surface:  #161b22;
  --surface2: #1c2331;
  --border:   #30363d;
  --border2:  #21262d;
  --green:    #3fb950;
  --green-dim:#238636;
  --green-glow: rgba(63,185,80,.18);
  --amber:    #d29922;
  --amber-bg: rgba(210,153,34,.12);
  --red:      #f85149;
  --red-bg:   rgba(248,81,73,.1);
  --blue:     #58a6ff;
  --blue-bg:  rgba(88,166,255,.1);
  --text:     #e6edf3;
  --text-2:   #8b949e;
  --text-3:   #484f58;
  --radius:   10px;
  --radius-lg:16px;
}

html, body { height: 100%; font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }

/* ── LOGIN ── */
#login-screen {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  background: var(--bg);
  background-image: radial-gradient(ellipse at 20% 50%, rgba(63,185,80,.06) 0%, transparent 60%),
                    radial-gradient(ellipse at 80% 20%, rgba(88,166,255,.05) 0%, transparent 50%);
}
.login-card {
  width: 100%; max-width: 380px; padding: 40px 36px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: 0 24px 64px rgba(0,0,0,.5);
}
.login-logo {
  display: flex; align-items: center; gap: 10px; margin-bottom: 32px;
}
.login-logo-icon {
  width: 40px; height: 40px; border-radius: 10px;
  background: linear-gradient(135deg, var(--green-dim), var(--green));
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 20px var(--green-glow);
}
.login-logo-text { font-size: 15px; font-weight: 600; color: var(--text); line-height: 1.3; }
.login-logo-sub { font-size: 12px; color: var(--text-2); font-weight: 400; }
.login-card h2 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
.login-card p { font-size: 14px; color: var(--text-2); margin-bottom: 28px; }
.field { margin-bottom: 16px; }
.field label { display: block; font-size: 12px; font-weight: 600; color: var(--text-2); margin-bottom: 6px; letter-spacing: 0.4px; text-transform: uppercase; }
.field input {
  width: 100%; padding: 10px 14px;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: var(--radius); color: var(--text);
  font-family: 'DM Mono', monospace; font-size: 14px;
  outline: none; transition: border-color .15s, box-shadow .15s;
}
.field input:focus { border-color: var(--green); box-shadow: 0 0 0 3px var(--green-glow); }
.login-err { font-size: 13px; color: var(--red); margin-bottom: 12px; display: none; }
.btn-login {
  width: 100%; padding: 11px; margin-top: 4px;
  background: var(--green-dim); color: #fff;
  border: none; border-radius: var(--radius);
  font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600;
  cursor: pointer; transition: background .15s, box-shadow .15s;
  box-shadow: 0 0 16px var(--green-glow);
}
.btn-login:hover { background: var(--green); }

/* ── APP ── */
#app { display: none; min-height: 100vh; }

.topbar {
  height: 56px; background: var(--surface); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 24px; gap: 16px;
  position: sticky; top: 0; z-index: 100;
}
.topbar-logo { display: flex; align-items: center; gap: 9px; }
.topbar-logo-icon {
  width: 30px; height: 30px; border-radius: 8px;
  background: linear-gradient(135deg, var(--green-dim), var(--green));
  display: flex; align-items: center; justify-content: center;
}
.topbar-title { font-size: 14px; font-weight: 700; }
.topbar-badge {
  font-size: 10px; font-weight: 700; letter-spacing: 0.6px; text-transform: uppercase;
  padding: 3px 8px; border-radius: 100px;
  background: var(--green-glow); color: var(--green); border: 1px solid rgba(63,185,80,.3);
}
.topbar-spacer { flex: 1; }
.topbar-status { font-size: 12px; color: var(--text-2); display: flex; align-items: center; gap: 6px; }
.status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
.btn-logout {
  padding: 6px 12px; font-size: 12px; font-weight: 600;
  background: transparent; border: 1px solid var(--border);
  color: var(--text-2); border-radius: 6px; cursor: pointer;
  transition: all .15s;
}
.btn-logout:hover { border-color: var(--red); color: var(--red); }

.layout { display: flex; height: calc(100vh - 56px); overflow: hidden; }

.sidebar {
  width: 280px; min-width: 280px;
  background: var(--surface); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
}
.sidebar-header { padding: 16px 16px 12px; border-bottom: 1px solid var(--border2); }
.sidebar-header h3 { font-size: 11px; font-weight: 700; color: var(--text-2); text-transform: uppercase; letter-spacing: 0.8px; }
.sidebar-search { margin-top: 10px; position: relative; }
.sidebar-search svg { position:absolute; left:9px; top:50%; transform:translateY(-50%); width:14px; height:14px; color:var(--text-3); }
.sidebar-search input {
  width: 100%; padding: 7px 10px 7px 30px;
  background: var(--bg); border: 1px solid var(--border2);
  border-radius: 7px; color: var(--text);
  font-family: 'DM Sans', sans-serif; font-size: 13px; outline: none;
}
.sidebar-actions { padding: 8px 8px 0; }
.btn-clear-sel {
  width: 100%; padding: 6px 10px; font-size: 12px; font-weight: 600;
  background: transparent; border: 1px solid var(--border2);
  color: var(--text-2); border-radius: 6px; cursor: pointer;
  transition: all .15s; text-align: center;
}
.btn-clear-sel:hover { border-color: var(--amber); color: var(--amber); }

.sidebar-list { flex: 1; overflow-y: auto; padding: 8px; }
.person-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 10px; border-radius: 8px; cursor: pointer;
  transition: background .12s; user-select: none; margin-bottom: 1px;
}
.person-item:hover { background: var(--surface2); }
.person-item.active { background: var(--green-glow); }
.person-name { font-size: 13px; font-weight: 500; flex: 1; }
.person-count { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 100px; }

.person-panel { border-top: 1px solid var(--border); padding: 14px; display: none; }
.person-panel.open { display: block; }
.panel-name { font-size: 13px; font-weight: 700; margin-bottom: 10px; }
.panel-dates { display: flex; flex-direction: column; gap: 5px; }
.panel-date-btn {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 10px; border-radius: 7px; cursor: pointer;
  background: var(--bg); border: 1px solid var(--border2);
  font-size: 12px; transition: all .12s;
}
.panel-date-btn.allocated { background: var(--green-glow); border-color: var(--green); color: var(--green); }

.main { flex: 1; overflow: auto; padding: 24px; display: flex; flex-direction: column; gap: 20px; }
.toolbar { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.toolbar-title { font-size: 18px; font-weight: 700; }
.btn { padding: 8px 16px; border-radius: 7px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; display: flex; align-items: center; gap: 6px; transition: all .15s; }
.btn-green { background: var(--green-dim); color: #fff; }
.btn-ghost { background: transparent; border: 1px solid var(--border2); color: var(--text-2); }

.stats { display: flex; gap: 10px; flex-wrap: wrap; }
.stat-pill { display: flex; align-items: center; gap: 8px; padding: 8px 14px; border-radius: var(--radius); background: var(--surface); border: 1px solid var(--border); font-size: 13px; }
.stat-pill .num { font-weight: 700; color: var(--green); }

.table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
table.escala { border-collapse: collapse; width: 100%; }
table.escala thead th { padding: 12px 16px; text-align: center; font-size: 11px; color: var(--text-2); background: var(--surface2); border-bottom: 1px solid var(--border); }
table.escala thead th .col-date { font-size: 14px; font-weight: 700; color: var(--text); display: block; }
table.escala tbody td { padding: 10px 16px; border-bottom: 1px solid var(--border2); vertical-align: top; }

/* Zebra stripes on name rows inside cells */
.slot-cell { min-height: 60px; display: flex; flex-direction: column; gap: 0; align-items: stretch; }
.name-row {
  padding: 6px 10px;
  font-size: 12px; font-weight: 600;
  color: #ffffff;
  cursor: pointer;
  display: flex; align-items: center; justify-content: space-between;
  transition: opacity .12s;
}
.name-row:hover { opacity: 0.75; }
.name-row.zebra-even { background: rgba(255,255,255,0.04); }
.name-row.zebra-odd  { background: rgba(255,255,255,0.09); }
.name-row .remove { opacity: 0.4; font-size: 13px; }

.unavail-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px 20px; }
.unavail-list { display: flex; flex-wrap: wrap; align-items: center; gap: 0; margin-top: 10px; }
.unavail-row {
  font-size: 13px; font-weight: 500;
  color: var(--text-2);
}
.unavail-sep {
  color: var(--text-3);
  font-size: 14px;
  margin: 0 6px;
  user-select: none;
}

#loading-overlay { position:fixed; inset:0; background:rgba(0,0,0,.8); display:flex; align-items:center; justify-content:center; z-index:999; flex-direction: column; gap: 15px; }
#loading-overlay.hidden { display:none; }
.spinner { width: 40px; height: 40px; border: 4px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon">✝</div>
      <div>
        <div class="login-logo-text">Grupo de Evangelismo</div>
        <div class="login-logo-sub">Painel Administrativo</div>
      </div>
    </div>
    <h2>Acesso</h2>
    <div class="field">
      <label>Usuário</label>
      <input type="text" id="login-user" value="admin">
    </div>
    <div class="field">
      <label>Senha</label>
      <input type="password" id="login-pass" placeholder="escala2026">
    </div>
    <div class="login-err" id="login-err">Credenciais inválidas.</div>
    <button class="btn-login" onclick="doLogin()">Entrar</button>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div class="topbar-logo"><span class="topbar-title">Escala Admin</span></div>
    <span class="topbar-badge">Maio 2026</span>
    <div class="topbar-spacer"></div>
    <div class="topbar-status"><div class="status-dot"></div><span>Online</span></div>
    <button class="btn-logout" onclick="location.reload()">Sair</button>
  </div>

  <div class="layout">
    <div class="sidebar">
      <div class="sidebar-header">
        <h3>Membros (<span id="sb-count">0</span>)</h3>
        <div class="sidebar-search">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="6.5" cy="6.5" r="4.5"/><line x1="10.5" y1="10.5" x2="14" y2="14"/></svg>
          <input type="text" id="search-input" placeholder="Filtrar..." oninput="renderSidebar()">
        </div>
      </div>
      <div class="sidebar-actions">
        <button class="btn-clear-sel" onclick="clearSelection()">Limpar seleção</button>
      </div>
      <div class="sidebar-list" id="sidebar-list"></div>
      <div class="person-panel" id="person-panel">
        <div class="panel-name" id="panel-name">---</div>
        <div class="panel-dates" id="panel-dates"></div>
      </div>
    </div>

    <div class="main">
      <div class="toolbar">
        <div class="toolbar-title">Escala Mensal</div>
        <div class="toolbar-spacer"></div>
        <button class="btn btn-ghost" onclick="clearAll()">Limpar</button>
        <button class="btn btn-ghost" onclick="reloadSheet()">Atualizar Dados</button>
        <button class="btn btn-green" onclick="doDownload()">Exportar PNG</button>
      </div>

      <div class="stats" id="stats-strip"></div>

      <div class="table-wrap" id="capture-area">
        <table class="escala">
          <thead id="escala-head"></thead>
          <tbody id="escala-body"></tbody>
        </table>
      </div>

      <div class="unavail-section">
        <strong>Indisponíveis no mês:</strong>
        <div class="unavail-list" id="unavail-list"></div>
      </div>
    </div>
  </div>
</div>

<div id="loading-overlay" class="hidden">
  <div class="spinner"></div>
  <p id="loading-msg">Carregando...</p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script>
/* CONFIG */
var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyQacux9pNeju5fuqrpk51NKfdzp7S_SSMjKi93jp0N8vz9XsxPWoTxtJrnqoWlw7eLyg/exec';
var ADMIN_USER = 'admin';
var ADMIN_PASS = 'aaaa';

var GROUP_DATES = [
  { key: '06/mai', label: '06/mai', full: '06 de maio', day: 'Quarta',  hora: '18h às 19h30' },
  { key: '09/mai', label: '09/mai', full: '09 de maio', day: 'Sábado',  hora: '10h às 11h30' },
  { key: '20/mai', label: '20/mai', full: '20 de maio', day: 'Quarta',  hora: '18h às 19h30' },
  { key: '24/mai', label: '24/mai', full: '24 de maio', day: 'Domingo', hora: '17h às 18h30' },
  { key: '30/mai', label: '30/mai', full: '30 de maio', day: 'Sábado',  hora: '9h30 às 11h'  },
];

var MEMBERS = [
  'ALAN','ALEX','ALFREDO','BIANCA R.','BIANCA M.','CELIANA',
  'CRIS MEDEIROS','CRISTINA ANJOS','DALILA','ELIZANGELA','FERNANDA',
  'FRANCISCA','JEAN','JOÃO','LÉO','LUCIANA FERNANDES','LUCIANE MARTINS',
  'MARCIO SANTOS','MARILDA','MARÍLIA','MATHEUS','MEDEIROS','PR. HUMBERTO',
  'PR. MARCIO','PRA. DANIELA SOARES','RODOLFO','ROSE','SALATHIEL',
  'SEBASTIANA','SUELLEN','VANESSA ROCHA','ZEMA'
];

var memberData = {};
var schedule = {};
GROUP_DATES.forEach(d => schedule[d.key] = []);
var selectedPersons = new Set();

/* AUTH */
function doLogin() {
  const u = document.getElementById('login-user').value;
  const p = document.getElementById('login-pass').value;
  if(u === ADMIN_USER && p === ADMIN_PASS) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadSheet();
  } else {
    document.getElementById('login-err').style.display = 'block';
  }
}

/* JSONP LOAD */
function loadSheet() {
  showLoading('Carregando dados da planilha…');
  var script = document.createElement('script');
  var callbackName = 'gsCallback_' + Date.now();
  window[callbackName] = function(data) {
    delete window[callbackName];
    document.body.removeChild(script);
    processSheetData(data);
    hideLoading();
  };
  script.onerror = function() {
    delete window[callbackName];
    if (script.parentNode) document.body.removeChild(script);
    useFallback();
  };
  script.src = SCRIPT_URL + '?action=getAll&callback=' + callbackName;
  document.body.appendChild(script);
}

function reloadSheet() { loadSheet(); }

function useFallback() {
  MEMBERS.forEach(function(name){ memberData[name] = null; });
  hideLoading();
  renderAll();
  alert('⚠️ Não foi possível ler a planilha automaticamente.');
}

/* PROCESSAMENTO */
function processSheetData(rows) {
  let sheetMap = {};
  (rows || []).forEach(row => {
    let name = String(row[0] || '').trim().toLowerCase();
    let date = String(row[1] || '').trim().toLowerCase();
    let status = String(row[2] || '').trim().toLowerCase();
    if(!name) return;
    if(!sheetMap[name]) sheetMap[name] = [];
    if(status.includes('dispon')) {
       let match = GROUP_DATES.find(d => date.includes(d.key.split('/')[0]));
       if(match) sheetMap[name].push(match.key);
    }
  });
  MEMBERS.forEach(m => {
    let key = m.toLowerCase();
    memberData[m] = sheetMap[key] ? { dates: sheetMap[key] } : null;
  });
  renderAll();
}

/* RENDERERS */
function renderAll() {
  renderSidebar();
  renderTable();
  renderUnavail();
  renderStats();
}

function renderSidebar() {
  const list = document.getElementById('sidebar-list');
  const filter = document.getElementById('search-input').value.toLowerCase();
  list.innerHTML = '';
  let count = 0;
  MEMBERS.forEach(name => {
    if(filter && !name.toLowerCase().includes(filter)) return;
    if(!memberData[name] || memberData[name].dates.length === 0) return;
    count++;
    const isAlloc = GROUP_DATES.filter(d => schedule[d.key].includes(name)).length;
    const totalDisp = memberData[name].dates.length;
    const isSelected = selectedPersons.has(name);
    const div = document.createElement('div');
    div.className = `person-item ${isSelected ? 'active' : ''}`;
    div.innerHTML = `
      <div class="person-name">${name}</div>
      <div class="person-count">${isAlloc}/${totalDisp}</div>
    `;
    div.onclick = () => selectPerson(name);
    list.appendChild(div);
  });
  document.getElementById('sb-count').textContent = count;
}

function selectPerson(name) {
  if(selectedPersons.has(name)) selectedPersons.delete(name);
  else selectedPersons.add(name);
  renderSidebar();
  renderPanel();
}

function clearSelection() {
  selectedPersons.clear();
  renderSidebar();
  renderPanel();
}

function renderPanel() {
  const panel = document.getElementById('person-panel');
  const datesDiv = document.getElementById('panel-dates');
  const panelName = document.getElementById('panel-name');
  if(selectedPersons.size === 0) { panel.classList.remove('open'); return; }
  panel.classList.add('open');
  panelName.textContent = selectedPersons.size === 1
    ? [...selectedPersons][0]
    : `${selectedPersons.size} membros selecionados`;
  const allDates = new Set();
  selectedPersons.forEach(name => { (memberData[name]?.dates || []).forEach(d => allDates.add(d)); });
  datesDiv.innerHTML = '';
  [...allDates].forEach(dk => {
    const dObj = GROUP_DATES.find(d => d.key === dk);
    if(!dObj) return;
    const membersWithDate = [...selectedPersons].filter(n => memberData[n]?.dates.includes(dk));
    const allAllocated = membersWithDate.every(n => schedule[dk].includes(n));
    const btn = document.createElement('div');
    btn.className = `panel-date-btn ${allAllocated ? 'allocated' : ''}`;
    btn.innerHTML = `<span>${dObj.day}, ${dObj.full} · ${dObj.hora}</span><span>${allAllocated ? '✓' : '+'}</span>`;
    btn.onclick = () => toggleAllocMulti(dk, allAllocated);
    datesDiv.appendChild(btn);
  });
}

function toggleAllocMulti(dk, shouldRemove) {
  selectedPersons.forEach(name => {
    if(!memberData[name]?.dates.includes(dk)) return;
    const idx = schedule[dk].indexOf(name);
    if(shouldRemove && idx > -1) schedule[dk].splice(idx, 1);
    else if(!shouldRemove && idx === -1) schedule[dk].push(name);
  });
  renderAll(); renderPanel();
}

function toggleAlloc(name, dk) {
  const idx = schedule[dk].indexOf(name);
  if(idx > -1) schedule[dk].splice(idx, 1);
  else schedule[dk].push(name);
  renderAll(); renderPanel();
}

function renderTable() {
  const head = document.getElementById('escala-head');
  const body = document.getElementById('escala-body');
  head.innerHTML = `<tr>${GROUP_DATES.map(d =>
    `<th><span class="col-date">${d.full}</span><span class="col-day">${d.day} · ${d.hora}</span></th>`
  ).join('')}</tr>`;
  let bodyHtml = '<tr>';
  GROUP_DATES.forEach(d => {
    bodyHtml += `<td><div class="slot-cell">`;
    schedule[d.key].forEach((name, i) => {
      const zebraClass = i % 2 === 0 ? 'zebra-even' : 'zebra-odd';
      bodyHtml += `<div class="name-row ${zebraClass}" onclick="toggleAlloc('${name}','${d.key}')">${name}<span class="remove">×</span></div>`;
    });
    bodyHtml += `</div></td>`;
  });
  body.innerHTML = bodyHtml + '</tr>';
}

function renderUnavail() {
  const list = document.getElementById('unavail-list');
  const un = MEMBERS.filter(m => !memberData[m] || memberData[m].dates.length === 0);
  list.innerHTML = un.map((m, i) =>
    `<span class="unavail-row">${m}</span>${i < un.length - 1 ? '<span class="unavail-sep">·</span>' : ''}`
  ).join('');
}

function renderStats() {
  const total = GROUP_DATES.reduce((acc, d) => acc + schedule[d.key].length, 0);
  document.getElementById('stats-strip').innerHTML = `
    <div class="stat-pill">Total Alocados: <span class="num">${total}</span></div>
    <div class="stat-pill">Membros com Dados: <span class="num">${MEMBERS.filter(m => memberData[m]).length}</span></div>
  `;
}

/* UI UTILS */
function showLoading(msg) {
  document.getElementById('loading-msg').textContent = msg;
  document.getElementById('loading-overlay').classList.remove('hidden');
}
function hideLoading() { document.getElementById('loading-overlay').classList.add('hidden'); }
function clearAll() { if(confirm('Limpar escala?')) { GROUP_DATES.forEach(d => schedule[d.key] = []); renderAll(); } }

function doDownload() {
  showLoading('Gerando imagem...');
  const wrap = document.createElement('div');
  wrap.style.cssText = `
    position: fixed; left: -9999px; top: 0;
    width: 900px; padding: 48px 52px;
    background: #f8f9fb;
    font-family: 'DM Sans', Arial, sans-serif;
    color: #0f172a;
  `;

  const dayMap = { 'Quarta': 'QUARTA-FEIRA', 'Sábado': 'SÁBADO', 'Domingo': 'DOMINGO' };

  let html = `
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
      <div style="font-size:13px; font-weight:700; letter-spacing:1.5px; color:#6b7a99; text-transform:uppercase;">GRUPO DE EVANGELISMO</div>
      <div style="font-size:13px; font-weight:600; color:#6b7a99; letter-spacing:1px;">MAIO 2026</div>
    </div>
    <div style="height:2px; background:#e2e8f0; margin-bottom:28px;"></div>
    <table style="width:100%; border-collapse:collapse; table-layout:fixed;">
      <thead><tr>
  `;

  GROUP_DATES.forEach(d => {
    const dateNum = d.key.replace('/mai', '/05');
    const dayLabel = dayMap[d.day] || d.day.toUpperCase();
    html += `
      <th style="padding:14px 12px; background:#ffffff; border:1px solid #e2e8f0; text-align:center; vertical-align:top;">
        <div style="font-size:11px; font-weight:700; color:#5b6fa8; letter-spacing:0.8px; margin-bottom:4px;">${dayLabel}</div>
        <div style="font-size:16px; font-weight:800; color:#0f172a; margin-bottom:4px;">${dateNum}</div>
        <div style="font-size:11px; color:#94a3b8;">${d.hora}</div>
      </th>
    `;
  });

  html += `</tr></thead><tbody><tr>`;

  GROUP_DATES.forEach(d => {
    const names = schedule[d.key] || [];
    html += `<td style="padding:0; border:1px solid #e2e8f0; vertical-align:top; background:#f8f9fb; text-align:center;">`;
    if (names.length === 0) {
      html += `<div style="padding:12px; color:#cbd5e1; font-size:14px;">—</div>`;
    } else {
      names.forEach((name, i) => {
        const bg = i % 2 === 0 ? '#f8f9fb' : '#eef1f6';
        html += `
          <div style="
            padding: 8px 12px;
            background: ${bg};
            font-size: 12px;
            font-weight: 700;
            color: #0f172a;
            letter-spacing: 0.3px;
            text-align: center;
            border-bottom: 1px solid #e2e8f0;
          ">${name}</div>
        `;
      });
    }
    html += `</td>`;
  });

  html += `</tr></tbody></table>`;
  wrap.innerHTML = html;
  document.body.appendChild(wrap);

  setTimeout(() => {
    html2canvas(wrap, {
      backgroundColor: '#f8f9fb',
      scale: 2,
      useCORS: true,
      logging: false
    }).then(canvas => {
      document.body.removeChild(wrap);
      hideLoading();
      const link = document.createElement('a');
      link.download = 'escala-evangelismo-maio-2026.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    }).catch(() => {
      document.body.removeChild(wrap);
      hideLoading();
      alert('Erro ao gerar imagem.');
    });
  }, 150);
}
</script>

</body>
</html>
