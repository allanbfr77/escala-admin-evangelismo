<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escala Admin — Ministério de Evangelismo & Introdução — Maio 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:       #0d1117;
  --surface:  #161b22;
  --surface2: #1c2331;
  --border:   #30363d;
  --border2:  #21262d;
  --green:    #3fb950;
  --green-dim:#238636;
  --green-glow: rgba(63,185,80,.18);
  --amber:    #d29922;
  --red:      #f85149;
  --text:     #e6edf3;
  --text-2:   #8b949e;
  --text-3:   #484f58;
  --radius:   10px;
  --radius-lg:16px;
}

html, body { height: 100%; font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }

/* ── LOGIN ── */
#login-screen {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  background: var(--bg);
  background-image: radial-gradient(ellipse at 20% 50%, rgba(63,185,80,.06) 0%, transparent 60%),
                    radial-gradient(ellipse at 80% 20%, rgba(88,166,255,.05) 0%, transparent 50%);
}
.login-card {
  width: 100%; max-width: 380px; padding: 40px 36px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-lg); box-shadow: 0 24px 64px rgba(0,0,0,.5);
}
.login-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 32px; }
.login-logo-icon {
  width: 40px; height: 40px; border-radius: 10px;
  background: linear-gradient(135deg, var(--green-dim), var(--green));
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 20px var(--green-glow);
}
.login-logo-text { font-size: 15px; font-weight: 600; color: var(--text); line-height: 1.3; }
.login-logo-sub  { font-size: 12px; color: var(--text-2); font-weight: 400; }
.login-card h2   { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
.field { margin-bottom: 16px; }
.field label { display: block; font-size: 12px; font-weight: 600; color: var(--text-2); margin-bottom: 6px; letter-spacing: 0.4px; text-transform: uppercase; }
.field-input-wrap { position: relative; }
.field input {
  width: 100%; padding: 10px 40px 10px 14px;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: var(--radius); color: var(--text);
  font-family: 'DM Mono', monospace; font-size: 14px;
  outline: none; transition: border-color .15s, box-shadow .15s;
}
.field input:focus { border-color: var(--green); box-shadow: 0 0 0 3px var(--green-glow); }
.eye-btn {
  position: absolute; right: 11px; top: 50%; transform: translateY(-50%);
  background: none; border: none; cursor: pointer; color: var(--text-3);
  padding: 2px; display: flex; align-items: center; transition: color .15s;
}
.eye-btn:hover { color: var(--text-2); }
.login-err { font-size: 13px; color: var(--red); margin-bottom: 12px; display: none; }
.btn-login {
  width: 100%; padding: 11px; margin-top: 4px;
  background: var(--green-dim); color: #fff;
  border: none; border-radius: var(--radius);
  font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600;
  cursor: pointer; transition: background .15s;
  box-shadow: 0 0 16px var(--green-glow);
}
.btn-login:hover { background: var(--green); }

/* ── APP ── */
#app { display: none; min-height: 100vh; }

.topbar {
  height: 56px; background: var(--surface); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 24px; gap: 16px;
  position: sticky; top: 0; z-index: 100;
}
.topbar-title { font-size: 14px; font-weight: 700; }
.topbar-badge {
  font-size: 10px; font-weight: 700; letter-spacing: 0.6px; text-transform: uppercase;
  padding: 3px 8px; border-radius: 100px;
  background: var(--green-glow); color: var(--green); border: 1px solid rgba(63,185,80,.3);
}
.topbar-spacer { flex: 1; }
.topbar-status { font-size: 12px; color: var(--text-2); display: flex; align-items: center; gap: 6px; }
.save-status { font-size: 11px; font-weight: 600; letter-spacing: 0.2px; min-width: 90px; text-align: right; transition: color .3s; }
.status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
.btn-logout {
  padding: 6px 12px; font-size: 12px; font-weight: 600;
  background: transparent; border: 1px solid var(--border);
  color: var(--text-2); border-radius: 6px; cursor: pointer; transition: all .15s;
}
.btn-logout:hover { border-color: var(--red); color: var(--red); }

.layout { display: flex; height: calc(100vh - 56px); overflow: hidden; }

/* ── SIDEBAR ── */
.sidebar {
  width: 280px; min-width: 280px;
  background: var(--surface); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
}
.sidebar-header { padding: 16px 16px 12px; border-bottom: 1px solid var(--border2); }
.sidebar-header h3 { font-size: 11px; font-weight: 700; color: var(--text-2); text-transform: uppercase; letter-spacing: 0.8px; }
.sidebar-search { margin-top: 10px; position: relative; }
.sidebar-search svg { position:absolute; left:9px; top:50%; transform:translateY(-50%); width:14px; height:14px; color:var(--text-3); }
.sidebar-search input {
  width: 100%; padding: 7px 10px 7px 30px;
  background: var(--bg); border: 1px solid var(--border2);
  border-radius: 7px; color: var(--text);
  font-family: 'DM Sans', sans-serif; font-size: 13px; outline: none;
}
.sidebar-actions { padding: 8px 8px 0; }
.btn-clear-sel {
  width: 100%; padding: 6px 10px; font-size: 12px; font-weight: 600;
  background: transparent; border: 1px solid var(--border2);
  color: var(--text-2); border-radius: 6px; cursor: pointer;
  transition: all .15s; text-align: center;
}
.btn-clear-sel:hover { border-color: var(--amber); color: var(--amber); }
.sidebar-list { flex: 1; overflow-y: auto; padding: 8px; }
.person-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 10px; border-radius: 8px; cursor: pointer;
  transition: background .12s; user-select: none; margin-bottom: 1px;
}
.person-item:hover { background: var(--surface2); }
.person-item.active { background: var(--green-glow); }
.person-name { font-size: 13px; font-weight: 500; flex: 1; }
.person-count { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 100px; }
.person-panel { border-top: 1px solid var(--border); padding: 14px; display: none; }
.person-panel.open { display: block; }
.panel-name { font-size: 13px; font-weight: 700; margin-bottom: 10px; }
.panel-dates { display: flex; flex-direction: column; gap: 5px; }
.panel-date-btn {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 10px; border-radius: 7px; cursor: pointer;
  background: var(--bg); border: 1px solid var(--border2);
  font-size: 12px; transition: all .12s;
}
.panel-date-btn.allocated { background: var(--green-glow); border-color: var(--green); color: var(--green); }

/* ── MAIN ── */
.main { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
.main-header { flex-shrink: 0; padding: 24px 24px 0; display: flex; flex-direction: column; gap: 16px; }
.main-content { flex: 1; overflow: auto; padding: 16px 24px 24px; display: flex; flex-direction: column; gap: 20px; }
.main-content > * { flex-shrink: 0; }
.toolbar { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.toolbar-title { font-size: 18px; font-weight: 700; }
.btn { padding: 8px 16px; border-radius: 7px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; display: flex; align-items: center; gap: 6px; transition: all .15s; }
.btn-green { background: var(--green-dim); color: #fff; }
.btn-ghost { background: transparent; border: 1px solid var(--border2); color: var(--text-2); }
.stats { display: flex; gap: 10px; flex-wrap: wrap; }
.stat-pill { display: flex; align-items: center; gap: 8px; padding: 8px 14px; border-radius: var(--radius); background: var(--surface); border: 1px solid var(--border); font-size: 13px; }
.stat-pill .num { font-weight: 700; color: var(--green); }

/* ── DASHBOARD TABLE ── */
.table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
table.escala { border-collapse: collapse; width: 100%; }
table.escala thead th { padding: 12px 16px; text-align: center; font-size: 11px; color: var(--text-2); background: var(--surface2); border-bottom: 1px solid var(--border); }
table.escala thead th .col-date { font-size: 14px; font-weight: 700; color: var(--text); display: block; }
table.escala tbody td { padding: 10px 16px; border-bottom: 1px solid var(--border2); vertical-align: top; }
.slot-cell { min-height: 60px; display: flex; flex-direction: column; gap: 0; align-items: stretch; }
.name-row {
  padding: 6px 10px; font-size: 12px; font-weight: 600; color: #ffffff;
  cursor: default; display: flex; align-items: center; justify-content: space-between;
}
.name-row.zebra-even { background: rgba(255,255,255,0.04); }
.name-row.zebra-odd  { background: rgba(255,255,255,0.09); }
.name-row .remove {
  opacity: 0.35; font-size: 15px; cursor: pointer;
  padding: 2px 6px; border-radius: 4px;
  transition: opacity .12s, color .12s, background .12s;
  line-height: 1;
}
.name-row .remove:hover { opacity: 1; color: var(--red); background: rgba(248,81,73,.12); }

/* ── AVAILABILITY SECTION ── */
.avail-section {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-lg); overflow: hidden;
}
.avail-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px; cursor: pointer; user-select: none;
  border-bottom: 1px solid transparent; transition: border-color .2s;
}
.avail-header.open { border-bottom-color: var(--border2); }
.avail-header-left { display: flex; align-items: center; gap: 8px; }
.avail-header strong { font-size: 13px; font-weight: 700; }
.avail-eye { color: var(--text-3); display: flex; align-items: center; transition: color .15s; }
.avail-header:hover .avail-eye { color: var(--text-2); }
.avail-body { display: none; padding: 14px 16px 16px; }
.avail-body.open { display: block; }
.avail-blocks { display: flex; gap: 10px; flex-wrap: wrap; }
.avail-block { flex: 1; min-width: 0; }
.avail-table { width: 100%; border-collapse: collapse; font-size: 10.5px; }
.avail-table th {
  padding: 4px 5px; text-align: center;
  background: var(--surface2); border: 1px solid var(--border2);
  color: var(--text-2); font-weight: 700; font-size: 10px; letter-spacing: 0.3px;
}
.avail-table th.th-name { text-align: left; min-width: 80px; }
.avail-table td { padding: 4px 5px; border: 1px solid var(--border2); text-align: center; vertical-align: middle; }
.avail-table td.td-name {
  text-align: left; font-size: 10.5px; font-weight: 600;
  color: var(--text); white-space: nowrap; padding-left: 6px;
}
.avail-table td.td-name.no-data { color: var(--text-3); font-weight: 400; }
.avail-table td.td-name.scheduled   { color: var(--green); font-weight: 700; }
.avail-table td.td-name.unavailable { color: var(--red);   font-weight: 600; }
.avail-table tr:nth-child(even) td { background: rgba(255,255,255,0.025); }
.avail-table tr:nth-child(odd)  td { background: rgba(255,255,255,0.06); }
.avail-check { color: var(--green); font-size: 11px; font-weight: 700; }

/* ── MOBILE TABS ── */
.mobile-tabs { display: none; }

/* ── LOADING ── */
#loading-overlay { position:fixed; inset:0; background:rgba(0,0,0,.8); display:flex; align-items:center; justify-content:center; z-index:999; flex-direction:column; gap:15px; }
#loading-overlay.hidden { display:none; }
.spinner { width:40px; height:40px; border:4px solid var(--border); border-top-color:var(--green); border-radius:50%; animation:spin 1s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

/* ── MOBILE ── */
.btn-sidebar-toggle {
  display: none; background: transparent; border: 1px solid var(--border);
  color: var(--text-2); border-radius: 6px; padding: 6px 10px;
  cursor: pointer; font-size: 18px; line-height: 1;
}
.sidebar-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 49; }
.sidebar-backdrop.open { display: block; }

@media (max-width: 768px) {
  .login-card { padding: 32px 20px; margin: 16px; }
  .topbar { padding: 0 14px; gap: 10px; }
  .topbar-status { display: none; }
  .btn-sidebar-toggle { display: flex; align-items: center; justify-content: center; }
  .layout { position: relative; overflow: hidden; }
  .sidebar {
    position: fixed; top: 56px; left: 0; bottom: 0;
    width: 280px; z-index: 50;
    transform: translateX(-100%); transition: transform .25s ease;
  }
  .sidebar.open { transform: translateX(0); }
  .main-header { padding: 12px 14px 0; gap: 10px; }
  .main-content { padding: 10px 14px 14px; gap: 14px; }
  .toolbar { gap: 8px; }
  .toolbar-title { font-size: 15px; flex: 1; }
  .btn { padding: 7px 11px; font-size: 12px; }

  /* Dashboard → vertical cards */
  .table-wrap { background: transparent; border: none; border-radius: 0; overflow: visible; }
  table.escala, table.escala thead, table.escala tbody,
  table.escala tr, table.escala th, table.escala td { display: block; width: 100%; }
  table.escala thead tr { display: none; }
  table.escala tbody tr { display: flex; flex-direction: column; gap: 10px; }
  table.escala tbody td {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: 0; overflow: hidden;
  }
  table.escala tbody td::before {
    content: attr(data-label);
    display: block; padding: 10px 14px 8px;
    font-size: 11px; font-weight: 700; color: var(--text-2);
    background: var(--surface2); border-bottom: 1px solid var(--border2);
    text-transform: uppercase; letter-spacing: 0.6px;
  }
  .slot-cell { min-height: 40px; }
  .name-row { font-size: 13px; padding: 8px 14px; }
  .stat-pill { font-size: 12px; padding: 6px 10px; }

  /* Avail blocks stack */
  .avail-blocks { flex-direction: column; gap: 14px; }
  .avail-table { font-size: 11px; }
  .avail-table td.td-name { font-size: 11px; }

  /* Mobile tabs */
  .mobile-tabs {
    display: flex;
    background: var(--surface2);
    border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,.35);
  }
  .mobile-tab {
    flex: 1; padding: 11px 12px; background: transparent; border: none;
    font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 700;
    color: var(--text-2); cursor: pointer; transition: background .15s, color .15s;
    letter-spacing: 0.2px;
  }
  .mobile-tab.active {
    background: var(--green-glow); color: var(--green);
    box-shadow: inset 0 -2px 0 var(--green);
  }

  /* Section visibility by active tab */
  .main:not(.show-avail) .main-content .avail-section { display: none; }
  .main.show-avail .main-content #stats-strip,
  .main.show-avail .main-content .table-wrap { display: none; }

  /* Remove touch on name-row — bigger tap zone for × */
  .name-row .remove { padding: 4px 10px; font-size: 16px; }
}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon">✝</div>
      <div>
        <div class="login-logo-text">Ministério de Evangelismo & Introdução</div>
        <div class="login-logo-sub">Painel Administrativo</div>
      </div>
    </div>
    <h2>Acesso</h2>
    <div class="field">
      <label>Usuário</label>
      <div class="field-input-wrap">
        <input type="text" id="login-user" value="admin">
      </div>
    </div>
    <div class="field">
      <label>Senha</label>
      <div class="field-input-wrap">
        <input type="password" id="login-pass" placeholder="••••••••">
        <button class="eye-btn" type="button" onclick="togglePass()" id="eye-btn" aria-label="Mostrar senha">
          <svg id="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>
    <div class="login-err" id="login-err">Credenciais inválidas.</div>
    <button class="btn-login" onclick="doLogin()">Entrar</button>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <button class="btn-sidebar-toggle" onclick="toggleSidebar()">☰</button>
    <span class="topbar-title">Escala Admin</span>
    <span class="topbar-badge">Maio 2026</span>
    <div class="topbar-spacer"></div>
    <div class="topbar-status"><div class="status-dot"></div><span>Online</span></div>
    <span class="save-status" id="save-status"></span>
    <button class="btn-logout" onclick="doLogout()">Sair</button>
  </div>

  <div class="layout">
    <div class="sidebar-backdrop" id="sidebar-backdrop" onclick="closeSidebar()"></div>
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h3>Membros (<span id="sb-count">0</span>)</h3>
        <div class="sidebar-search">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="6.5" cy="6.5" r="4.5"/><line x1="10.5" y1="10.5" x2="14" y2="14"/></svg>
          <input type="text" id="search-input" placeholder="Filtrar..." oninput="renderSidebar()">
        </div>
      </div>
      <div class="sidebar-actions">
        <button class="btn-clear-sel" onclick="clearSelection()">Limpar seleção</button>
      </div>
      <div class="sidebar-list" id="sidebar-list"></div>
      <div class="person-panel" id="person-panel">
        <div class="panel-name" id="panel-name">---</div>
        <div class="panel-dates" id="panel-dates"></div>
      </div>
    </div>

    <div class="main">
      <div class="main-header">
        <div class="toolbar">
          <div class="toolbar-title">Escala Mensal</div>
          <div class="toolbar-spacer"></div>
          <button class="btn btn-ghost" onclick="clearAll()">Limpar Escala</button>
          <button class="btn btn-ghost" onclick="reloadSheet()">Atualizar Dados</button>
          <button class="btn btn-green" onclick="doDownload()">Exportar PNG</button>
        </div>

        <div class="mobile-tabs" id="mobile-tabs">
          <button class="mobile-tab active" id="tab-escala" onclick="switchTab('escala')">Escala</button>
          <button class="mobile-tab" id="tab-avail" onclick="switchTab('avail')">Disponibilidades</button>
        </div>
      </div>

      <div class="main-content">
        <div class="stats" id="stats-strip"></div>

        <div class="table-wrap" id="capture-area">
          <table class="escala">
            <thead id="escala-head"></thead>
            <tbody id="escala-body"></tbody>
          </table>
        </div>

        <div class="avail-section">
        <div class="avail-header" id="avail-header" onclick="toggleAvail()">
          <div class="avail-header-left">
            <strong>Disponibilidades dos Membros</strong>
          </div>
          <span class="avail-eye" id="avail-eye">
            <svg id="avail-eye-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
              <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </span>
        </div>
        <div class="avail-body" id="avail-body">
          <div class="avail-blocks" id="avail-blocks"></div>
        </div>
        </div><!-- /avail-section -->
      </div><!-- /main-content -->
    </div><!-- /main -->
  </div><!-- /layout -->
</div><!-- /app -->

<div id="loading-overlay" class="hidden">
  <div class="spinner"></div>
  <p id="loading-msg">Carregando...</p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyQacux9pNeju5fuqrpk51NKfdzp7S_SSMjKi93jp0N8vz9XsxPWoTxtJrnqoWlw7eLyg/exec';
var ADMIN_USER = 'admin';
var ADMIN_PASS = 'aaaa';

/* key  → ISO 8601 (único identificador interno, enviado à API e ao localStorage)
   label → string de exibição PT-BR (interface visual, cabeçalhos, painel) */
var GROUP_DATES = [
  { key: '2026-05-06', label: '06/mai', full: '06 de maio', day: 'Quarta',  hora: '18h às 19h30' },
  { key: '2026-05-09', label: '09/mai', full: '09 de maio', day: 'Sábado',  hora: '10h às 11h30' },
  { key: '2026-05-20', label: '20/mai', full: '20 de maio', day: 'Quarta',  hora: '18h às 19h30' },
  { key: '2026-05-24', label: '24/mai', full: '24 de maio', day: 'Domingo', hora: '17h às 18h30' },
  { key: '2026-05-30', label: '30/mai', full: '30 de maio', day: 'Sábado',  hora: '9h30 às 11h'  },
];

var MEMBERS = [
  'ALAN','ALEX','ALFREDO','BIANCA R.','BIANCA M.','CELIANA',
  'CRIS MEDEIROS','CRISTINA ANJOS','DALILA','ELIZANGELA','FERNANDA',
  'FRANCISCA','JEAN','JOÃO','LÉO','LUCIANA FERNANDES','LUCIANE MARTINS',
  'MARCIO SANTOS','MARILDA','MARÍLIA','MATHEUS','MEDEIROS','MIRIAN','PR. HUMBERTO',
  'PR. MARCIO','PRA. DANIELA','RODOLFO','ROSE','SALATHIEL',
  'SEBASTIANA','SUELLEN','VANESSA ROCHA','ZEMA'
];

var memberData = {};
var schedule = {};
GROUP_DATES.forEach(function(d){ schedule[d.key] = []; });
var selectedPerson = null;

/* ── PERSISTÊNCIA LOCAL (cache / fallback) ── */
var STORAGE_KEY     = 'escala_evangelismo_maio2026_v2'; // v2 = chaves ISO 8601
var SESSION_KEY     = 'escala_session_maio2026';
var SHEET_CACHE_KEY = 'escala_sheet_cache_maio2026';

function saveSchedule() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(schedule)); } catch(e) {}
}

function loadSchedule() {
  try {
    var saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      var parsed = JSON.parse(saved);
      GROUP_DATES.forEach(function(d) {
        if (Array.isArray(parsed[d.key])) schedule[d.key] = parsed[d.key];
      });
      dedupeScheduleEntries();
    }
  } catch(e) {}
}

/* ── SAVE STATUS ── */
var _saveTimer = null;
function setSaveStatus(state) {
  var el = document.getElementById('save-status');
  if (!el) return;
  clearTimeout(_saveTimer);
  if (state === 'saving') {
    el.textContent = '● Salvando…';
    el.style.color = 'var(--amber)';
  } else if (state === 'ok') {
    el.textContent = '✓ Salvo';
    el.style.color = 'var(--green)';
    _saveTimer = setTimeout(function() { el.textContent = ''; }, 2500);
  } else if (state === 'error') {
    el.textContent = '⚠ Erro ao salvar';
    el.style.color = 'var(--red)';
    _saveTimer = setTimeout(function() { el.textContent = ''; }, 5000);
  }
}

/* ── SINCRONIZAÇÃO COM A PLANILHA ── */

/* Camada de sanitização: converte QUALQUER representação de data recebida
   (ISO, "06/mai", string longa do Sheets com fuso, Date serializado) para
   o formato interno ISO 8601 "YYYY-MM-DD". Retorna null se não reconhecer. */
function formatDateForCode(raw) {
  if (!raw) return null;
  var s = String(raw).trim();

  // 1) Já está em ISO "YYYY-MM-DD"
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) {
    return GROUP_DATES.some(function(g){ return g.key === s; }) ? s : null;
  }

  // 2) Formato legado "06/mai" ou "09/Mai"
  var mLeg = s.match(/^(\d{1,2})\/mai$/i);
  if (mLeg) {
    var dd = parseInt(mLeg[1], 10);
    var hit = null;
    GROUP_DATES.forEach(function(g) {
      if (parseInt(g.key.split('-')[2], 10) === dd) hit = g.key;
    });
    return hit;
  }

  // 3) String no formato "Sat May 09 2026 ..." gerada pelo Google Sheets
  //    — extrai mês/dia/ano via regex para evitar falha em browsers com
  //    caracteres não-ASCII no nome do fuso (ex: "Horário Padrão de Brasília")
  var MON = { jan:1,feb:2,mar:3,apr:4,may:5,jun:6,jul:7,aug:8,
              sep:9,oct:10,nov:11,dec:12 };
  var mStr = s.match(/\b(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\s+(\d{1,2})\s+(\d{4})\b/i);
  if (mStr) {
    var mo = MON[mStr[1].toLowerCase()];
    var dy = parseInt(mStr[2], 10);
    var yr = parseInt(mStr[3], 10);
    if (mo && dy && yr) {
      var iso = yr + '-' + (mo < 10 ? '0'+mo : mo) + '-' + (dy < 10 ? '0'+dy : dy);
      return GROUP_DATES.some(function(g){ return g.key === iso; }) ? iso : null;
    }
  }

  return null;
}

/* Remove nomes repetidos por data (chave nome normalizada em maiúsculas). */
function dedupeScheduleEntries() {
  GROUP_DATES.forEach(function(d) {
    var arr = schedule[d.key];
    if (!Array.isArray(arr)) { schedule[d.key] = []; return; }
    var seen = {};
    schedule[d.key] = arr.filter(function(name) {
      var k = String(name).trim().toUpperCase();
      if (!k || seen[k]) return false;
      seen[k] = true;
      return true;
    });
  });
}

/* Carrega a escala salva na aba "Escala" do Google Sheets.
   Roda em paralelo com loadSheet(); sobrescreve o cache do localStorage
   quando o servidor responde com sucesso. */
function loadScheduleFromSheet() {
  if (!window.fetch) return;
  fetch(SCRIPT_URL + '?action=getSchedule&t=' + Date.now(), { cache: 'no-store' })
    .then(function(res) { return res.json(); })
    .then(function(sched) {
      if (!sched || sched.error || typeof sched !== 'object') return;
      GROUP_DATES.forEach(function(d) { schedule[d.key] = []; });
      Object.keys(sched).forEach(function(rawKey) {
        var key = formatDateForCode(rawKey);
        if (key && Array.isArray(sched[rawKey])) schedule[key] = sched[rawKey];
      });
      dedupeScheduleEntries();
      saveSchedule();
      renderAll();
    })
    .catch(function() { /* mantém dados do localStorage */ });
}

/* Persiste o estado completo da escala via setSchedule.
   Substitui addPerson/removePerson individuais — evita problema de
   comparação de formato de data no servidor. */
function syncToSheet() {
  setSaveStatus('saving');
  if (!window.fetch) { setSaveStatus('error'); return; }
  dedupeScheduleEntries();
  var url = SCRIPT_URL
    + '?action=setSchedule'
    + '&sched=' + encodeURIComponent(JSON.stringify(schedule))
    + '&t='     + Date.now();
  fetch(url, { cache: 'no-store' })
    .then(function(res) { return res.json(); })
    .then(function(r) { setSaveStatus(r && r.error ? 'error' : 'ok'); })
    .catch(function() { setSaveStatus('error'); });
}

function saveSession()  { try { sessionStorage.setItem(SESSION_KEY, '1'); } catch(e) {} }
function clearSession() { try { sessionStorage.removeItem(SESSION_KEY); } catch(e) {} }
function hasSession()   { try { return sessionStorage.getItem(SESSION_KEY) === '1'; } catch(e) { return false; } }

function saveSheetCache(rows) {
  try { localStorage.setItem(SHEET_CACHE_KEY, JSON.stringify(rows || [])); } catch (e) {}
}

function loadSheetCache() {
  try {
    var saved = localStorage.getItem(SHEET_CACHE_KEY);
    if (!saved) return null;
    var parsed = JSON.parse(saved);
    return Array.isArray(parsed) ? parsed : null;
  } catch (e) {
    return null;
  }
}

function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  loadSchedule();           // renderização imediata via cache local
  loadSheet();              // carrega disponibilidades do servidor
  loadScheduleFromSheet();  // sobrescreve escala com dados do servidor
  if (window.innerWidth <= 768) switchTab('escala');
}

function doLogout() {
  clearSession();
  location.reload();
}

/* ── AUTH ── */
function doLogin() {
  var u = document.getElementById('login-user').value;
  var p = document.getElementById('login-pass').value;
  if (u === ADMIN_USER && p === ADMIN_PASS) {
    saveSession();
    showApp();
  } else {
    document.getElementById('login-err').style.display = 'block';
  }
}

/* ── Auto-login se sessão ativa ── */
(function() { if (hasSession()) showApp(); })();

function togglePass() {
  var inp = document.getElementById('login-pass');
  var icon = document.getElementById('eye-icon');
  var show = inp.type === 'password';
  inp.type = show ? 'text' : 'password';
  icon.innerHTML = show
    ? '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>'
    : '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';
}

/* ── LOAD ── */
function loadSheet() {
  showLoading('Carregando dados da planilha…');
  loadSheetViaFetch()
    .then(function(rows) {
      processSheetData(rows);
      saveSheetCache(rows);
      hideLoading();
    })
    .catch(function() {
      loadSheetViaJsonp();
    });
}

function loadSheetViaFetch() {
  return new Promise(function(resolve, reject) {
    if (!window.fetch) {
      reject(new Error('fetch indisponivel'));
      return;
    }
    var timeoutId = setTimeout(function() {
      reject(new Error('timeout'));
    }, 10000);
    fetch(SCRIPT_URL + '?action=getAll&t=' + Date.now(), {
      method: 'GET',
      cache: 'no-store'
    })
      .then(function(res) {
        if (!res.ok) throw new Error('http_' + res.status);
        return res.json();
      })
      .then(function(data) {
        clearTimeout(timeoutId);
        resolve(Array.isArray(data) ? data : []);
      })
      .catch(function(err) {
        clearTimeout(timeoutId);
        reject(err);
      });
  });
}

function loadSheetViaJsonp() {
  var script = document.createElement('script');
  var cbName = 'gsCallback_' + Date.now();

  var tid = setTimeout(function() {
    if (window[cbName]) {
      delete window[cbName];
      if (script.parentNode) document.body.removeChild(script);
      useFallback();
    }
  }, 10000);

  window[cbName] = function(data) {
    clearTimeout(tid);
    delete window[cbName];
    if (script.parentNode) document.body.removeChild(script);
    processSheetData(data);
    saveSheetCache(data);
    hideLoading();
  };

  script.onerror = function() {
    clearTimeout(tid);
    delete window[cbName];
    if (script.parentNode) document.body.removeChild(script);
    useFallback();
  };

  script.src = SCRIPT_URL + '?action=getAll&callback=' + cbName + '&t=' + Date.now();
  document.body.appendChild(script);
}

function reloadSheet() {
  loadSheet();
  loadScheduleFromSheet();
}

function useFallback() {
  var cachedRows = loadSheetCache();
  if (cachedRows) {
    processSheetData(cachedRows);
    hideLoading();
    return;
  }
  MEMBERS.forEach(function(n){ memberData[n] = null; });
  hideLoading();
  renderAll();
}

function processSheetData(rows) {
  var map         = {};
  var unavailable = {};
  (rows || []).forEach(function(row) {
    var name   = String(row[0]||'').trim().toLowerCase();
    var date   = String(row[1]||'').trim();
    var status = String(row[2]||'').trim().toLowerCase();
    if (!name) return;
    if (date === 'INDISPONIVEL_TOTAL') {
      unavailable[name] = true;
      if (!map[name]) map[name] = [];
      return;
    }
    if (!map[name]) map[name] = [];
    if (status.includes('dispon')) {
      var isoKey = formatDateForCode(date);
      if (isoKey) map[name].push(isoKey);
    }
  });
  MEMBERS.forEach(function(m) {
    var k = m.toLowerCase();
    if (map[k] !== undefined) {
      memberData[m] = { dates: map[k], totallyUnavailable: unavailable[k] || false };
    } else {
      memberData[m] = null;
    }
  });
  renderAll();
}

/* ── HELPER: verifica se um membro está escalado em ao menos uma data ── */
function isScheduled(name) {
  return GROUP_DATES.some(function(d) {
    return schedule[d.key].includes(name);
  });
}

/* ── RENDER ALL ── */
function renderAll() {
  renderSidebar();
  renderTable();
  renderStats();
  renderAvailGrid();
}

/* ── SIDEBAR ── */
function renderSidebar() {
  var list   = document.getElementById('sidebar-list');
  var filter = document.getElementById('search-input').value.toLowerCase();
  list.innerHTML = '';
  var count = 0;
  MEMBERS.forEach(function(name) {
    if (filter && !name.toLowerCase().includes(filter)) return;
    if (!memberData[name] || memberData[name].dates.length === 0) return;
    count++;
    var isAlloc = GROUP_DATES.filter(function(d){ return schedule[d.key].includes(name); }).length;
    var total   = memberData[name].dates.length;
    var active  = selectedPerson === name;
    var div = document.createElement('div');
    div.className = 'person-item' + (active ? ' active' : '');
    div.innerHTML = '<div class="person-name">' + name + '</div><div class="person-count">' + isAlloc + '/' + total + '</div>';
    div.onclick = function(){ selectPerson(name); };
    list.appendChild(div);
  });
  document.getElementById('sb-count').textContent = count;
}

function selectPerson(name) {
  selectedPerson = selectedPerson === name ? null : name;
  renderSidebar();
  renderPanel();
}

function clearSelection() {
  selectedPerson = null;
  renderSidebar();
  renderPanel();
}

function renderPanel() {
  var panel = document.getElementById('person-panel');
  var datesDiv = document.getElementById('panel-dates');
  var panelName = document.getElementById('panel-name');
  if (!selectedPerson) { panel.classList.remove('open'); return; }
  panel.classList.add('open');
  panelName.textContent = selectedPerson;
  var dateOrder = GROUP_DATES.map(function(d){ return d.key; });
  var dates = ((memberData[selectedPerson] && memberData[selectedPerson].dates) || [])
    .slice()
    .sort(function(a, b){ return dateOrder.indexOf(a) - dateOrder.indexOf(b); });
  datesDiv.innerHTML = '';
  dates.forEach(function(dk) {
    var dObj = GROUP_DATES.find(function(d){ return d.key === dk; });
    if (!dObj) return;
    var allocated = schedule[dk].includes(selectedPerson);
    var btn = document.createElement('div');
    btn.className = 'panel-date-btn' + (allocated ? ' allocated' : '');
    btn.innerHTML = '<span>' + dObj.day + ', ' + dObj.full + ' · ' + dObj.hora + '</span><span>' + (allocated ? '✓' : '+') + '</span>';
    btn.onclick = function(){ toggleAlloc(selectedPerson, dk); };
    datesDiv.appendChild(btn);
  });
}

/* ── TABLE ── */
function renderTable() {
  var head = document.getElementById('escala-head');
  var body = document.getElementById('escala-body');
  head.innerHTML = '<tr>' + GROUP_DATES.map(function(d){
    return '<th><span class="col-date">' + d.full + '</span><span class="col-day">' + d.day + ' · ' + d.hora + '</span></th>';
  }).join('') + '</tr>';
  var html = '<tr>';
  GROUP_DATES.forEach(function(d) {
    html += '<td data-label="' + d.day + ' · ' + d.full + ' · ' + d.hora + '"><div class="slot-cell">';
    schedule[d.key].forEach(function(name, i) {
      var z = i % 2 === 0 ? 'zebra-even' : 'zebra-odd';
      html += '<div class="name-row ' + z + '">' + name + '<span class="remove" onclick="toggleAlloc(\'' + name + '\',\'' + d.key + '\')">×</span></div>';
    });
    html += '</div></td>';
  });
  body.innerHTML = html + '</tr>';
}

function toggleAlloc(name, dk) {
  var idx = schedule[dk].indexOf(name);
  if (idx > -1) schedule[dk].splice(idx, 1);
  else schedule[dk].push(name);
  dedupeScheduleEntries();
  saveSchedule();
  renderAll();
  renderPanel();
  syncToSheet();
}

/* ── AVAIL GRID ── */
var availOpen = false;

function toggleAvail() {
  availOpen = !availOpen;
  var header = document.getElementById('avail-header');
  var body   = document.getElementById('avail-body');
  var icon   = document.getElementById('avail-eye-icon');
  header.classList.toggle('open', availOpen);
  body.classList.toggle('open', availOpen);
  icon.innerHTML = availOpen
    ? '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>'
    : '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';
}

function renderAvailGrid() {
  var container = document.getElementById('avail-blocks');
  if (!container) return;
  var dayNums = GROUP_DATES.map(function(d){ return d.label.split('/')[0]; });
  var chunks = [];
  for (var i = 0; i < MEMBERS.length; i += 11) chunks.push(MEMBERS.slice(i, i + 11));
  var html = '';
  chunks.forEach(function(chunk) {
    html += '<div class="avail-block"><table class="avail-table"><thead><tr><th class="th-name">Nome</th>';
    dayNums.forEach(function(n){ html += '<th>' + n + '</th>'; });
    html += '</tr></thead><tbody>';
    chunk.forEach(function(name) {
      var data    = memberData[name];
      var hasData = data && data.dates && data.dates.length > 0;
      var scheduled         = isScheduled(name);
      var totallyUnavailable = data && data.totallyUnavailable;
      var nameClass = 'td-name';
      if      (scheduled)          nameClass += ' scheduled';
      else if (totallyUnavailable) nameClass += ' unavailable';
      else if (!data)              nameClass += ' no-data';
      html += '<tr><td class="' + nameClass + '">' + name + '</td>';
      GROUP_DATES.forEach(function(d) {
        var avail = hasData && data.dates.includes(d.key);
        html += '<td>' + (avail ? '<span class="avail-check">✓</span>' : '<span style="color:var(--text-3);font-size:11px;">—</span>') + '</td>';
      });
      html += '</tr>';
    });
    html += '</tbody></table></div>';
  });
  container.innerHTML = html;
}

/* ── STATS ── */
function renderStats() {
  var total = GROUP_DATES.reduce(function(a, d){ return a + schedule[d.key].length; }, 0);
  document.getElementById('stats-strip').innerHTML =
    '<div class="stat-pill">Total Alocados: <span class="num">' + total + '</span></div>' +
    '<div class="stat-pill">Membros com Dados: <span class="num">' + MEMBERS.filter(function(m){ return memberData[m]; }).length + '</span></div>';
}

/* ── MOBILE TABS ── */
function switchTab(tab) {
  var main      = document.querySelector('.main');
  var tabEscala = document.getElementById('tab-escala');
  var tabAvail  = document.getElementById('tab-avail');
  var statsEl   = document.getElementById('stats-strip');
  var tableEl   = document.getElementById('capture-area');
  var availEl   = document.querySelector('.avail-section');

  if (tab === 'avail') {
    main.classList.add('show-avail');
    tabEscala.classList.remove('active');
    tabAvail.classList.add('active');
    statsEl.style.display  = 'none';
    tableEl.style.display  = 'none';
    availEl.style.display  = 'block';
    if (!availOpen) {
      availOpen = true;
      document.getElementById('avail-header').classList.add('open');
      document.getElementById('avail-body').classList.add('open');
      document.getElementById('avail-eye-icon').innerHTML =
        '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
    }
  } else {
    main.classList.remove('show-avail');
    tabEscala.classList.add('active');
    tabAvail.classList.remove('active');
    statsEl.style.display  = '';
    tableEl.style.display  = '';
    availEl.style.display  = 'none';
  }
}

/* ── MOBILE SIDEBAR ── */
function toggleSidebar() {
  var sb = document.getElementById('sidebar');
  var bd = document.getElementById('sidebar-backdrop');
  var open = sb.classList.toggle('open');
  bd.classList.toggle('open', open);
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-backdrop').classList.remove('open');
}

/* ── UTILS ── */
function showLoading(msg) {
  document.getElementById('loading-msg').textContent = msg;
  document.getElementById('loading-overlay').classList.remove('hidden');
}
function hideLoading() { document.getElementById('loading-overlay').classList.add('hidden'); }
function clearAll() {
  if (confirm('Limpar escala?')) {
    GROUP_DATES.forEach(function(d){ schedule[d.key] = []; });
    saveSchedule();
    renderAll();
    syncToSheet();
  }
}

/* ── EXPORT PNG ── */
function doDownload() {
  showLoading('Gerando imagem...');
  var wrap = document.createElement('div');
  wrap.style.cssText = 'position:fixed;left:-9999px;top:0;width:900px;padding:48px 52px;background:#f8f9fb;font-family:DM Sans,Arial,sans-serif;color:#0f172a;';
  var dayMap = { 'Quarta': 'QUARTA-FEIRA', 'Sábado': 'SÁBADO', 'Domingo': 'DOMINGO' };
  var html = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">'
    + '<div style="font-size:13px;font-weight:700;letter-spacing:1.5px;color:#6b7a99;text-transform:uppercase;">GRUPO DE EVANGELISMO</div>'
    + '<div style="font-size:13px;font-weight:600;color:#6b7a99;letter-spacing:1px;">MAIO 2026</div></div>'
    + '<div style="height:2px;background:#e2e8f0;margin-bottom:28px;"></div>'
    + '<table style="width:100%;border-collapse:collapse;table-layout:fixed;"><thead><tr>';
  GROUP_DATES.forEach(function(d) {
    var dayLabel  = dayMap[d.day] || d.day.toUpperCase();
    var dateLabel = d.full;
    html += '<th style="padding:14px 12px;background:#fff;border:1px solid #e2e8f0;text-align:center;vertical-align:top;">'
      + '<div style="font-size:11px;font-weight:700;color:#5b6fa8;letter-spacing:.8px;margin-bottom:4px;">' + dayLabel + '</div>'
      + '<div style="font-size:16px;font-weight:800;color:#0f172a;margin-bottom:4px;">' + dateLabel + '</div>'
      + '<div style="font-size:11px;color:#94a3b8;">' + d.hora + '</div></th>';
  });
  html += '</tr></thead><tbody><tr>';
  GROUP_DATES.forEach(function(d) {
    var names = schedule[d.key] || [];
    html += '<td style="padding:0;border:1px solid #e2e8f0;vertical-align:top;background:#f8f9fb;text-align:center;">';
    if (!names.length) {
      html += '<div style="padding:12px;color:#cbd5e1;font-size:14px;">—</div>';
    } else {
      names.forEach(function(name, i) {
        var bg = i % 2 === 0 ? '#f8f9fb' : '#eef1f6';
        html += '<div style="padding:8px 12px;background:' + bg + ';font-size:12px;font-weight:700;color:#0f172a;text-align:center;border-bottom:1px solid #e2e8f0;">' + name + '</div>';
      });
    }
    html += '</td>';
  });
  html += '</tr></tbody></table>';
  wrap.innerHTML = html;
  document.body.appendChild(wrap);
  setTimeout(function() {
    html2canvas(wrap, { backgroundColor: '#f8f9fb', scale: 2, useCORS: true, logging: false })
      .then(function(canvas) {
        document.body.removeChild(wrap);
        hideLoading();
        var link = document.createElement('a');
        link.download = 'escala-evangelismo-maio-2026.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
      }).catch(function() {
        document.body.removeChild(wrap);
        hideLoading();
        alert('Erro ao gerar imagem.');
      });
  }, 150);
}
